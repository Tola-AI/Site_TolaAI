document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

a7eb-4ee7-9e0e-3cbad37e1753\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"5270ba6c-d903-44cf-beb1-e854c9937474\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"330076ba-5140-4184-a5fb-15aa57677000\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  /* ============== TOKENS ============== */\n  :root{\n    --bg:#000000;\n    --bg-2:#0D0D0D;\n    --bg-3:#111111;\n    --bg-4:#1A1A1A;\n    --white:#FFFFFF;\n    --text-2:#888888;\n    --text-3:#5a5a5a;\n    --line:rgba(255,255,255,0.08);\n    --line-2:rgba(255,255,255,0.14);\n    --line-light:#E0E0E0;\n    --acc-1:#5E97EC;\n    --acc-2:#1924EC;\n    --grad:linear-gradient(135deg,#5E97EC 0%,#1924EC 100%);\n    --grad-soft:linear-gradient(135deg,rgba(94,151,236,.18) 0%,rgba(25,36,236,.18) 100%);\n    --side:80px;\n    --maxw:1280px;\n    --font: \"Mont\",\"Montserrat\",ui-sans-serif,system-ui,sans-serif;\n    --mono:\"JetBrains Mono\", ui-monospace, monospace;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:var(--font);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}\n  body{min-width:1440px;font-size:16px;line-height:1.6}\n  img{max-width:100%;display:block}\n  a{color:inherit;text-decoration:none}\n  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}\n  input,textarea,select{font-family:inherit}\n\n  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--side)}\n\n  /* ============== TYPE ============== */\n  .h1{font-weight:900;font-size:88px;line-height:1.02;letter-spacing:-0.02em;text-transform:uppercase}\n  .h2{font-weight:700;font-size:52px;line-height:1.08;letter-spacing:-0.015em}\n  .h3{font-weight:600;font-size:30px;line-height:1.2;letter-spacing:-0.01em}\n  .h4{font-weight:600;font-size:21px;line-height:1.3}\n  .body-lg{font-size:18px;line-height:1.6;color:#cfcfcf}\n  .muted{color:var(--text-2)}\n  .caption{font-size:13px;line-height:1.5;color:var(--text-2);letter-spacing:.02em}\n  .eyebrow{\n    font-family:var(--mono);font-size:13px;letter-spacing:.05em;color:var(--acc-1);\n    text-transform:lowercase;\n  }\n  .eyebrow b{font-weight:500;color:var(--acc-1);opacity:.8}\n  .grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}\n\n  /* ============== UI ============== */\n  .tag{\n    display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 12px;\n    border-radius:100px;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;\n    color:var(--acc-1);background:rgba(94,151,236,.12);border:1px solid rgba(94,151,236,.25);\n    font-family:var(--mono);\n  }\n  .tag.curly::before{content:\"{\";opacity:.7}\n  .tag.curly::after{content:\"}\";opacity:.7}\n\n  .btn{\n    display:inline-flex;align-items:center;justify-content:center;gap:10px;\n    height:54px;padding:0 32px;border-radius:8px;font-weight:600;font-size:14px;letter-spacing:.1em;\n    text-transform:uppercase;transition:all .25s ease; white-space:nowrap;\n  }\n  .btn-primary{background:var(--grad);color:#fff;box-shadow:0 8px 24px rgba(25,36,236,.25)}\n  .btn-primary:hover{filter:brightness(1.08);box-shadow:0 12px 32px rgba(25,36,236,.45);transform:translateY(-1px)}\n  .btn-secondary{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.5)}\n  .btn-secondary:hover{background:var(--grad);border-color:transparent}\n  .btn-ghost{background:transparent;color:#fff;border:1px solid var(--line-2)}\n  .btn-ghost:hover{border-color:var(--acc-1);color:var(--acc-1)}\n  .btn-ghost-dark{background:transparent;color:#000;border:1.5px solid #000}\n  .btn-ghost-dark:hover{background:#000;color:#fff}\n  .btn-sm{height:44px;padding:0 22px;font-size:12px}\n\n  .icon{width:24px;height:24px;display:inline-block;vertical-align:middle}\n  .arrow{width:14px;height:14px}\n\n  /* placeholder media */\n  .ph{\n    position:relative;background:#0a0a0a;overflow:hidden;border-radius:14px;\n    background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.025) 0 12px,transparent 12px 24px);\n  }\n  .ph::after{\n    content:attr(data-label);position:absolute;left:14px;bottom:12px;\n    font-family:var(--mono);font-size:11px;color:#666;letter-spacing:.05em;\n  }\n\n  /* section header */\n  .sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:48px;margin-bottom:64px}\n  .sec-head .left{max-width:760px}\n  .sec-head .eyebrow{display:inline-block;margin-bottom:18px}\n\n  /* divider */\n  .hr{height:1px;background:var(--line);border:0;margin:0}\n\n  /* ============== HEADER ============== */\n  header.nav{\n    position:fixed;top:0;left:0;right:0;z-index:50;\n    backdrop-filter:blur(20px);background:rgba(13,13,13,.72);\n    border-bottom:1px solid var(--line);\n  }\n  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:78px;padding:0 var(--side);max-width:none}\n  .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;letter-spacing:.02em}\n  .logo .mark{\n    width:32px;height:32px;border-radius:8px;background:var(--grad);\n    display:grid;place-items:center;color:#fff;font-weight:900;font-size:14px;\n    box-shadow:0 4px 18px rgba(25,36,236,.4);\n  }\n  .logo span{font-family:var(--font)}\n  .logo em{font-style:normal;color:var(--acc-1)}\n  .nav-links{display:flex;gap:38px}\n  .nav-links a{font-size:14px;font-weight:500;color:#dcdcdc;transition:color .2s}\n  .nav-links a:hover{color:var(--acc-1)}\n  .nav-right{display:flex;align-items:center;gap:24px}\n  .lang{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#aaa}\n  .lang .active{color:#fff;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}\n  .lang span.sep{color:#444}\n\n  /* ============== HERO ============== */\n  .hero{\n    position:relative;min-height:100vh;display:flex;align-items:center;\n    padding-top:120px;padding-bottom:80px;overflow:hidden;\n  }\n  .hero-glow{\n    position:absolute;inset:0;pointer-events:none;\n  }\n  .hero-glow .g1{\n    position:absolute;width:900px;height:900px;right:-220px;top:-220px;\n    background:radial-gradient(closest-side,rgba(25,36,236,.55),rgba(25,36,236,0) 70%);\n    filter:blur(20px);\n  }\n  .hero-glow .g2{\n    position:absolute;width:700px;height:700px;right:120px;top:120px;\n    background:radial-gradient(closest-side,rgba(94,151,236,.45),rgba(94,151,236,0) 70%);\n    filter:blur(10px);\n  }\n  .hero-glow .g3{\n    position:absolute;width:520px;height:520px;left:-180px;bottom:-160px;\n    background:radial-gradient(closest-side,rgba(25,36,236,.35),rgba(25,36,236,0) 70%);\n    filter:blur(20px);\n  }\n  .hero-grid{\n    position:absolute;inset:0;background-image:\n      linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),\n      linear-gradient(90deg,rgba(255,255,255,.04) 1px, transparent 1px);\n    background-size:80px 80px;\n    mask-image:radial-gradient(ellipse 80% 60% at 50% 40%, black 30%, transparent 80%);\n  }\n  .hero-inner{position:relative;z-index:2;width:100%}\n  .hero h1{margin:24px 0 28px}\n  .hero .subtitle{max-width:640px;margin-bottom:48px}\n  .hero-cta{display:flex;gap:16px;align-items:center}\n  .hero-meta{\n    position:absolute;left:var(--side);bottom:48px;display:flex;align-items:center;gap:24px;\n    z-index:3;\n  }\n  .hero-meta .scroll-ind{display:flex;align-items:center;gap:12px;color:var(--text-2);font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase}\n  .hero-meta .scroll-ind .line{width:48px;height:1px;background:linear-gradient(90deg,var(--text-2),transparent)}\n  .hero-side{\n    position:absolute;right:var(--side);bottom:48px;z-index:3;display:flex;gap:32px;\n    font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#777\n  }\n  .hero-side .item b{display:block;color:#fff;font-family:var(--font);font-weight:800;font-size:22px;margin-bottom:4px;letter-spacing:0}\n\n  /* hero floating preview tiles */\n  .hero-tiles{\n    position:absolute;right:var(--side);top:50%;transform:translateY(-50%);\n    display:grid;grid-template-columns:repeat(2,140px);grid-auto-rows:200px;gap:14px;\n    z-index:2;\n  }\n  .hero-tile{\n    border-radius:14px;border:1px solid var(--line-2);\n    background:linear-gradient(180deg,#1a1a1a,#0a0a0a);\n    position:relative;overflow:hidden;\n  }\n  .hero-tile::before{\n    content:\"\";position:absolute;inset:0;\n    background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.025) 0 8px,transparent 8px 16px);\n  }\n  .hero-tile.t1{transform:translateY(-22px)}\n  .hero-tile.t3{transform:translateY(22px)}\n  .hero-tile span{\n    position:absolute;left:10px;top:10px;font-family:var(--mono);font-size:10px;\n    color:var(--acc-1);background:rgba(0,0,0,.55);padding:3px 8px;border-radius:100px;\n    border:1px solid rgba(94,151,236,.3);letter-spacing:.06em\n  }\n  .hero-tile .play{\n    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);\n    width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.1);backdrop-filter:blur(8px);\n    display:grid;place-items:center;color:#fff;border:1px solid rgba(255,255,255,.2)\n  }\n\n  /* ============== ABOUT / STATS ============== */\n  section.about{padding:140px 0;background:var(--bg-2)}\n  .about-head{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:end;margin-bottom:96px}\n  .about-head h2{margin:18px 0 0}\n  .about-head p{color:var(--text-2);font-size:18px;line-height:1.6;max-width:480px}\n  .stats{\n    display:grid;grid-template-columns:repeat(4,1fr);\n    border:1px solid var(--line);border-radius:20px;overflow:hidden;\n    background:linear-gradient(180deg,#0f0f0f,#0a0a0a);\n  }\n  .stat{padding:48px 36px;border-right:1px solid var(--line);position:relative}\n  .stat:last-child{border-right:0}\n  .stat .num{font-weight:900;font-size:72px;line-height:1;letter-spacing:-.02em;display:flex;align-items:baseline;gap:6px}\n  .stat .num em{font-style:normal;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;font-size:48px}\n  .stat .label{margin-top:18px;color:var(--text-2);font-size:15px;line-height:1.5;max-width:200px}\n\n  /* ============== PORTFOLIO ============== */\n  section.portfolio{padding:140px 0;background:#000}\n  .portfolio-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:24px}\n  .pf-card{\n    background:#0c0c0c;border:1px solid var(--line);border-radius:18px;overflow:hidden;\n    transition:all .3s ease;\n  }\n  .pf-card:hover{border-color:rgba(94,151,236,.5);transform:translateY(-4px);box-shadow:0 20px 40px rgba(25,36,236,.18)}\n  .pf-card .media{aspect-ratio:16/10;position:relative}\n  .pf-card.tall .media{aspect-ratio:9/16}\n  .pf-card .media .play{\n    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);\n    width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.08);\n    backdrop-filter:blur(10px);display:grid;place-items:center;color:#fff;\n    border:1px solid rgba(255,255,255,.2);transition:all .25s\n  }\n  .pf-card:hover .media .play{background:var(--grad);border-color:transparent;transform:translate(-50%,-50%) scale(1.1)}\n  .pf-card .body{padding:22px 24px 26px}\n  .pf-card .row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}\n  .pf-card h4{margin:0 0 8px}\n  .pf-card .desc{color:var(--text-2);font-size:14px;line-height:1.55;margin-bottom:18px}\n  .pf-card .meta{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:12px;color:#666;letter-spacing:.05em}\n  .pf-card .meta .views{display:inline-flex;align-items:center;gap:6px;color:#aaa}\n\n  .pf-card.featured{grid-column:span 4}\n  .pf-card.regular{grid-column:span 4}\n\n  .pf-cta{margin-top:48px;display:flex;justify-content:center;align-items:center;gap:24px}\n  .pf-cta .info{color:var(--text-2);font-size:15px}\n\n  /* ============== ADVANTAGES (vs) ============== */\n  section.advantages{padding:140px 0;background:var(--bg-2);position:relative;overflow:hidden}\n  .advantages::before{\n    content:\"\";position:absolute;width:600px;height:600px;left:-200px;top:30%;\n    background:radial-gradient(closest-side,rgba(25,36,236,.18),transparent 70%);\n    pointer-events:none;\n  }\n  .adv-list{display:flex;flex-direction:column;gap:18px;position:relative}\n  .adv-row{\n    display:grid;grid-template-columns:64px 260px 1fr 56px 1fr;gap:28px;align-items:stretch;\n    padding:32px 36px;border:1px solid var(--line);border-radius:18px;\n    background:linear-gradient(180deg,rgba(20,20,20,.9),rgba(10,10,10,.9));\n    transition:all .3s\n  }\n  .adv-row:hover{border-color:rgba(94,151,236,.4)}\n  .adv-num{\n    font-family:var(--mono);font-size:14px;color:#444;align-self:start;letter-spacing:.05em;\n    padding-top:6px\n  }\n  .adv-title{align-self:center}\n  .adv-title h3{margin:0 0 8px;font-size:24px;font-weight:700;line-height:1.2}\n  .adv-title .tag{margin-top:4px}\n  .adv-vs{\n    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;\n    color:#444;\n  }\n  .adv-vs .line{width:1px;height:32px;background:var(--line-2)}\n  .adv-vs .word{font-family:var(--mono);f  document.querySelectorAll('.check').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('on')));\n\n  /* ======= Calculator ======= */\n  const types = document.querySelectorAll('#types .type');\n  const dyn = document.querySelectorAll('#dyn .radio');\n  const slider = document.getElementById('duration');\n  const durVal = document.getElementById('durVal');\n  const priceEl = document.getElementById('price');\n  const rType = document.getElementById('r-type');\n  const rDur = document.getElementById('r-dur');\n  const rSc = document.getElementById('r-sc');\n  const rTerm = document.getElementById('r-term');\n\n  let state = { base: 50000, mult: 1.0, dur: 45, addons: { script:0, mat:0, voice:8000 }, typeName: 'Рекламный ролик' };\n\n  function fmt(n){ return n.toLocaleString('ru-RU').replace(/,/g,' '); }\n  function mmss(s){ const m=Math.floor(s/60), sec=s%60; return m+':'+String(sec).padStart(2,'0'); }\n  function compute(){\n    // Price = base * mult * (1 + (dur-15)/180) + addons\n    const factor = 1 + (state.dur - 15)/180;\n    const addonSum = Object.values(state.addons).reduce((a,b)=>a+b,0);\n    const total = Math.round((state.base * state.mult * factor + addonSum) / 1000) * 1000;\n    priceEl.innerHTML = 'от '+fmt(total)+'<small>&nbsp;₽<\u002Fsmall>';\n    rType.textContent = state.typeName;\n    rDur.textContent = mmss(state.dur);\n    const scenes = Math.max(2, Math.round(state.dur / 7));\n    rSc.textContent = scenes;\n    const days = Math.max(3, Math.round(state.dur/15));\n    rTerm.textContent = days+'–'+(days+3)+' дней';\n    // duration display\n    durVal.innerHTML = mmss(state.dur)+'<small>≈ '+scenes+' сцен<\u002Fsmall>';\n    // slider track\n    const pct = ((state.dur-15)/(300-15))*100;\n    slider.style.background = 'linear-gradient(90deg,#5E97EC 0%, #1924EC '+pct+'%, #e8e8e8 '+pct+'%, #e8e8e8 100%)';\n  }\n\n  types.forEach(t=>{\n    t.addEventListener('click',()=>{\n      types.forEach(x=>x.classList.remove('active'));\n      t.classList.add('active');\n      state.base = +t.dataset.base;\n      state.typeName = t.querySelector('.lab').innerText.replace(/\\n/g,' ');\n      compute();\n    });\n  });\n  dyn.forEach(r=>r.addEventListener('click',()=>{\n    dyn.forEach(x=>x.classList.remove('active'));\n    r.classList.add('active');\n    state.mult = +r.dataset.mult;\n    compute();\n  }));\n  slider.addEventListener('input',e=>{\n    state.dur = +e.target.value;\n    compute();\n  });\n  document.querySelectorAll('.pills').forEach(group=>{\n    const key = group.dataset.key;\n    group.querySelectorAll('.pill').forEach(p=>{\n      p.addEventListener('click',()=>{\n        group.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));\n        p.classList.add('active');\n        state.addons[key] = +p.dataset.add;\n        compute();\n      });\n    });\n  });\n  compute();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
